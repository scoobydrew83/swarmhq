name: Documentation Update Dispatcher

# Watches qualifying pushes to develop and triggers docs-update.yml via
# workflow_dispatch, because claude-code-action does not support push events.

on:
  push:
    branches: [develop]
    paths:
      - 'src/**'
      - 'scripts/**'
      - 'package.json'

permissions:
  actions: write

jobs:
  dispatch:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Trigger docs update
        uses: actions/github-script@v9
        with:
          script: |
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'docs-update.yml',
              ref: context.ref,
              inputs: {
                current_sha: context.sha,
                before_sha: context.payload.before,
              },
            });
